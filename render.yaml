services:
  - type: web
    name: tsuricast
    runtime: python
    repo: https://github.com/sgrhirose-tech/fishing
    branch: claude/fishing-guide-website-BdGZB
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WEATHERAPI_KEY
        sync: false
