services:
  - type: web
    name: tsuricast
    runtime: python
    repo: https://github.com/sgrhirose-tech/fishing
    branch: master
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: gunicorn app.main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /
    previews:
      generation: automatic
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WEATHERAPI_KEY
        sync: false

  - type: cron
    name: tsuricast-morning-post
    runtime: python
    repo: https://github.com/sgrhirose-tech/fishing
    branch: master
    schedule: "55 10,18 * * *"   # 3:55 AM JST (18:55 UTC) + 7:55 PM JST (10:55 UTC)
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python scripts/post_morning_report.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: X_API_KEY
        sync: false
      - key: X_API_SECRET
        sync: false
      - key: X_ACCESS_TOKEN
        sync: false
      - key: X_ACCESS_TOKEN_SECRET
        sync: false

  - type: cron
    name: tsuricast-facilities-weekly
    runtime: python
    repo: https://github.com/sgrhirose-tech/fishing
    branch: master
    schedule: "0 18 * * 0"   # UTC日曜18:00 = JST月曜03:00
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python scripts/fetch_facilities.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GITHUB_TOKEN
        sync: false

  - type: cron
    name: tsuricast-tides-monthly
    runtime: python
    repo: https://github.com/sgrhirose-tech/fishing
    branch: master
    schedule: "0 18 1 * *"   # 毎月2日 AM3:00 JST（当月分を取得）
    buildCommand: "true"
    startCommand: python scripts/fetch_tides.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GITHUB_TOKEN
        sync: false

  - type: cron
    name: tsuricast-tides-prefetch
    runtime: python
    repo: https://github.com/sgrhirose-tech/fishing
    branch: master
    schedule: "0 18 24 * *"  # 毎月25日 AM3:00 JST（翌月分を先行取得）
    buildCommand: "true"
    startCommand: python scripts/fetch_tides.py --month next
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GITHUB_TOKEN
        sync: false

  - type: cron
    name: tsuricast-lead-text-weekly
    runtime: python
    repo: https://github.com/sgrhirose-tech/fishing
    branch: master
    schedule: "0 16 * * 0"   # 毎週日曜 01:00 JST（UTC 16:00）、30件ずつ処理（約19週で全563件完走）
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python scripts/gen_lead_texts.py --limit 30
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false

  - type: cron
    name: tsuricast-affiliate-check-monthly
    runtime: python
    repo: https://github.com/sgrhirose-tech/fishing
    branch: master
    schedule: "0 15 10 * *"  # 毎月10日 AM0:00 JST（UTC 15:00）
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python scripts/check_affiliate_links.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: cron
    name: tsuricast-aoi-comments
    runtime: python
    repo: https://github.com/sgrhirose-tech/fishing
    branch: master
    schedule: "0 3 * * *"      # 12:00 JST (03:00 UTC) — モニタリング用（SSR暖機はWebサービス内で00:05/12:00 JSTに実行）
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python tools/generate_aoi_comments.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WEATHERAPI_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_TO
        sync: false
      - key: MAIL_PASSWORD
        sync: false

  - type: cron
    name: tsuricast-aoi-test-prompt
    runtime: python
    repo: https://github.com/sgrhirose-tech/fishing
    branch: master
    schedule: "0 0 31 2 *"   # 手動トリガー専用（2月31日 = 自動実行なし）
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python tools/test_aoi_prompt.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WEATHERAPI_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_TO
        sync: false
      - key: MAIL_PASSWORD
        sync: false
